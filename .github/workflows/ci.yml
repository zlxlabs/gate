# 本仓自测:gate.yml 的静态契约(fork-PR 防护三处齐全等)在 PR 时 fail fast。
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pytest pyyaml
      - name: Run tests
        run: python -m pytest -q
